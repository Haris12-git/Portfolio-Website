<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product</title>
  <link rel="stylesheet" href="./styles/product.css">
</head>
<body>
  <section id="product">
    <h1>Our Product</h1>
    <div class="product-details">
      <img src="product.jpg" alt="Product Image" id="product-image">
      <div class="product-info">
        <h2>Product Name</h2>
        <p class="price">$99.99</p>
        <p class="description">This is a description of the product. It is an amazing product that you will love!</p>
        <button id="buy-now">Buy Now</button>
      </div>
    </div>
  </section>
</body>
</html>
